<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 排表管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 24px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-badge {
            background: #dc3545;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-info { background: #17a2b8; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        .stat-small {
            color: #999;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .role-management {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .add-role-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .add-role-form input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .role-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .role-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .role-name {
            font-weight: bold;
            color: #333;
        }
        .delete-role {
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }
        
        .inventory-management {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .inventory-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        .inventory-card .role-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .stock-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .stock-control input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .update-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .current-stock {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        .action-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .action-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
        }
        .action-card h4 {
            margin-bottom: 10px;
            color: #333;
        }
        .action-card p {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .delete-btn {
            width: 100%;
            padding: 8px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .table-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #343a40;
            color: white;
            padding: 12px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            background: #d4edda;
            color: #155724;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .data-management {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        
        .data-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .data-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .data-btn.backup {
            background: #17a2b8;
            color: white;
        }
        
        .data-btn.restore {
            background: #ffc107;
            color: #333;
        }
        
        .data-btn.share {
            background: #28a745;
            color: white;
        }
        
        @media (max-width: 768px) {
            .stats-grid, .action-grid, .data-buttons {
                grid-template-columns: 1fr;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 管理员后台 <span class="admin-badge">管理员</span></h1>
            <div class="nav-buttons">
                <button class="btn btn-primary" onclick="goHome()">返回首页</button>
                <button class="btn btn-success" onclick="exportCSV()">📥 导出CSV</button>
                <button class="btn btn-info" onclick="exportExcel()">📊 导出Excel</button>
                <button class="btn btn-danger" onclick="logout()">退出</button>
            </div>
        </div>
        
        <div id="message" class="message"></div>
        <div id="loading" class="loading">加载中...</div>
        
        <div class="main-content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-grid" id="statsCards"></div>
            
            <!-- 角色管理 -->
            <div class="role-management">
                <div class="section-title">🎭 角色管理</div>
                <div class="add-role-form">
                    <input type="text" id="newRoleName" placeholder="新角色名称">
                    <input type="number" id="newRoleStock" placeholder="初始配数" value="320" min="1">
                    <button class="btn btn-success" onclick="addRole()">添加角色</button>
                </div>
                <div class="role-list" id="roleList"></div>
            </div>
            
            <!-- 库存管理 -->
            <div class="inventory-management">
                <div class="section-title">📦 库存管理</div>
                <div class="inventory-grid" id="inventoryManagement"></div>
            </div>
            
            <!-- 管理操作 -->
            <div class="action-section">
                <div class="section-title">🛠️ 管理操作</div>
                <div class="action-grid">
                    <div class="action-card">
                        <h4>🗑️ 删除单条记录</h4>
                        <p>根据序号删除指定的排表记录</p>
                        <select id="orderSelect"></select>
                        <button class="delete-btn" onclick="deleteSingleOrder()">删除选中记录</button>
                    </div>
                    <div class="action-card">
                        <h4>👤 删除用户所有记录</h4>
                        <p>删除某个用户的所有排表</p>
                        <select id="userSelect"></select>
                        <button class="delete-btn" onclick="deleteUserOrders()">删除该用户所有记录</button>
                    </div>
                    <div class="action-card" style="border-left-color: #721c24;">
                        <h4>⚠️ 危险操作</h4>
                        <p>清空所有排表记录</p>
                        <button class="delete-btn" onclick="resetAllData()" style="background: #721c24;">清空所有数据</button>
                    </div>
                </div>
            </div>
            
            <!-- 数据管理 -->
            <div class="data-management">
                <div class="section-title">💾 数据备份与恢复</div>
                <div class="data-buttons">
                    <button class="data-btn backup" onclick="exportData()">📥 备份数据</button>
                    <button class="data-btn restore" onclick="importData()">📤 恢复数据</button>
                    <button class="data-btn share" onclick="shareData()">🔗 分享数据</button>
                </div>
            </div>
            
            <!-- 所有排表记录 -->
            <div class="table-section">
                <h2 style="margin-bottom: 20px;">📝 所有排表记录</h2>
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>CN</th>
                            <th>角色</th>
                            <th>数量</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 检查管理员权限
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'index.html';
        }

        // ===== 数据持久化 =====
        function saveDataToLocal(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function loadDataFromLocal(key, defaultValue) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : defaultValue;
        }

        // 初始化数据
        let roles = loadDataFromLocal('roles', [
            '丛云添', '大黑可不可', '西园练牙', '神名雪风', '鹿礼光',
            '斜木七基', '衣川季助', '五十竹芥太', '久乐间潮', '夏烧千弥',
            '畔川几成', '北片来人', '木之内太绪', '百目鬼潜', '白光琉衣',
            '白光潜衣', '蜂乃屋凪', '夜半', '辉矢宗氏'
        ]);

        let inventory = loadDataFromLocal('inventory', (() => {
            const inv = {};
            roles.forEach(role => {
                inv[role] = { total: 320, remaining: 320 };
            });
            return inv;
        })());

        let orders = loadDataFromLocal('orders', []);

        function saveAllData() {
            saveDataToLocal('roles', roles);
            saveDataToLocal('inventory', inventory);
            saveDataToLocal('orders', orders);
        }

        // 导出数据
        function exportData() {
            const data = {
                roles: roles,
                inventory: inventory,
                orders: orders,
                exportTime: new Date().toLocaleString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `管理备份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('✅ 备份文件已下载');
        }

        // 导入数据
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.roles && data.inventory) {
                            roles = data.roles;
                            inventory = data.inventory;
                            orders = data.orders || [];
                            saveAllData();
                            showMessage('✅ 数据恢复成功！刷新页面查看');
                            setTimeout(() => location.reload(), 1500);
                        } else {
                            showMessage('❌ 备份文件格式错误', false);
                        }
                    } catch (err) {
                        showMessage('❌ 文件读取失败', false);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // 分享数据
        function shareData() {
            const data = {
                roles: roles,
                inventory: inventory,
                orders: orders
            };
            
            const compressed = btoa(JSON.stringify(data));
            const shareUrl = `${location.origin}${location.pathname}?data=${compressed}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                showMessage('✅ 分享链接已复制到剪贴板！');
            }).catch(() => {
                prompt('复制以下链接分享给朋友：', shareUrl);
            });
        }

        // 加载分享数据
        function loadSharedData() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedData = urlParams.get('data');
            if (sharedData) {
                try {
                    const data = JSON.parse(atob(sharedData));
                    if (data.roles && data.inventory) {
                        roles = data.roles;
                        inventory = data.inventory;
                        orders = data.orders || [];
                        saveAllData();
                        window.history.replaceState({}, document.title, location.pathname);
                        showMessage('✅ 已加载分享的数据！');
                    }
                } catch (err) {
                    console.log('分享数据加载失败', err);
                }
            }
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.textContent = '✅ ' + text;
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // 更新统计
        function updateStats() {
            const users = [...new Set(orders.map(o => o.cn))];
            const totalQty = orders.reduce((sum, o) => sum + o.quantity, 0);
            const totalRemaining = Object.values(inventory).reduce((sum, i) => sum + i.remaining, 0);
            const totalInventory = Object.values(inventory).reduce((sum, i) => sum + i.total, 0);

            document.getElementById('statsCards').innerHTML = `
                <div class="stat-card">
                    <h3>总排表数量</h3>
                    <div class="stat-number">${totalQty}张</div>
                    <div class="stat-small">共 ${orders.length} 条记录</div>
                </div>
                <div class="stat-card">
                    <h3>参与人数</h3>
                    <div class="stat-number">${users.length}人</div>
                    <div class="stat-small">人均 ${users.length ? (totalQty/users.length).toFixed(1) : 0}张</div>
                </div>
                <div class="stat-card">
                    <h3>剩余库存</h3>
                    <div class="stat-number">${totalRemaining}张</div>
                    <div class="stat-small">完成度 ${((totalInventory-totalRemaining)/totalInventory*100).toFixed(1)}%</div>
                </div>
            `;
        }

        // 更新角色列表
        function updateRoleList() {
            const list = document.getElementById('roleList');
            list.innerHTML = '';

            roles.forEach(role => {
                const div = document.createElement('div');
                div.className = 'role-item';
                div.innerHTML = `
                    <span class="role-name">${role}</span>
                    <span class="delete-role" onclick="deleteRole('${role}')">×</span>
                `;
                list.appendChild(div);
            });
        }

        // 更新库存管理
        function updateInventoryManagement() {
            const grid = document.getElementById('inventoryManagement');
            grid.innerHTML = '';

            roles.forEach(role => {
                const item = inventory[role] || { total: 320, remaining: 320 };
                const div = document.createElement('div');
                div.className = 'inventory-card';
                div.innerHTML = `
                    <div class="role-name">${role}</div>
                    <div class="stock-control">
                        <input type="number" id="stock-${role}" value="${item.total}" min="1">
                        <button class="update-btn" onclick="updateStock('${role}')">更新配数</button>
                    </div>
                    <div class="current-stock">当前剩余: ${item.remaining}张</div>
                `;
                grid.appendChild(div);
            });
        }

        // 更新下拉框
        function updateSelects() {
            const orderSelect = document.getElementById('orderSelect');
            const userSelect = document.getElementById('userSelect');
            const users = [...new Set(orders.map(o => o.cn))];

            orderSelect.innerHTML = '<option value="">选择要删除的记录</option>';
            orders.forEach((order, i) => {
                orderSelect.innerHTML += `<option value="${i}">[${i}] ${order.cn} - ${order.role} - ${order.quantity}张</option>`;
            });

            userSelect.innerHTML = '<option value="">选择用户</option>';
            users.forEach(user => {
                userSelect.innerHTML += `<option value="${user}">${user}</option>`;
            });
        }

        // 更新订单表格
        function updateOrdersTable() {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">暂无记录</td></tr>';
                return;
            }

            orders.forEach((order, i) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${i}</td>
                        <td>${order.cn}</td>
                        <td>${order.role}</td>
                        <td>${order.quantity}张</td>
                        <td>${order.time}</td>
                    </tr>
                `;
            });
        }

        // 添加角色
        async function addRole() {
            const newRole = document.getElementById('newRoleName').value.trim();
            const stock = parseInt(document.getElementById('newRoleStock').value);

            if (!newRole) return alert('请输入角色名称');
            if (roles.includes(newRole)) return alert('角色已存在');

            roles.push(newRole);
            inventory[newRole] = { total: stock, remaining: stock };
            saveAllData();

            document.getElementById('newRoleName').value = '';
            updateRoleList();
            updateInventoryManagement();
            updateStats();
            updateSelects();
            showMessage(`角色 ${newRole} 添加成功`);
        }

        // 删除角色
        async function deleteRole(role) {
            if (!confirm(`确定要删除角色 ${role} 吗？`)) return;

            const hasOrders = orders.some(o => o.role === role);
            if (hasOrders && !confirm(`该角色已有排表记录，删除后相关记录将无法显示，确定继续？`)) return;

            roles = roles.filter(r => r !== role);
            delete inventory[role];
            saveAllData();

            updateRoleList();
            updateInventoryManagement();
            updateStats();
            updateSelects();
            updateOrdersTable();
            showMessage(`角色 ${role} 已删除`);
        }

        // 更新库存
        async function updateStock(role) {
            const newTotal = parseInt(document.getElementById(`stock-${role}`).value);
            if (newTotal < 1) return alert('配数必须大于0');

            const currentRemaining = inventory[role].remaining;
            const currentTotal = inventory[role].total;
            const diff = newTotal - currentTotal;
            const newRemaining = currentRemaining + diff;

            if (newRemaining < 0) {
                return alert('新配数不能小于已售出的数量');
            }

            inventory[role] = { total: newTotal, remaining: newRemaining };
            saveAllData();

            updateInventoryManagement();
            updateStats();
            showMessage(`${role} 配数已更新为 ${newTotal}`);
        }

        // 删除单条记录
        async function deleteSingleOrder() {
            const index = document.getElementById('orderSelect').value;
            if (index === '') return alert('请选择记录');

            if (!confirm('确定删除这条记录？')) return;

            const order = orders[index];
            inventory[order.role].remaining += order.quantity;
            orders.splice(index, 1);
            saveAllData();

            updateStats();
            updateSelects();
            updateOrdersTable();
            updateInventoryManagement();
            showMessage('记录已删除');
        }

        // 删除用户所有记录
        async function deleteUserOrders() {
            const user = document.getElementById('userSelect').value;
            if (user === '') return alert('请选择用户');

            if (!confirm(`确定删除用户 ${user} 的所有记录？`)) return;

            let deleted = 0;
            const newOrders = orders.filter(order => {
                if (order.cn === user) {
                    inventory[order.role].remaining += order.quantity;
                    deleted++;
                    return false;
                }
                return true;
            });

            orders = newOrders;
            saveAllData();

            updateStats();
            updateSelects();
            updateOrdersTable();
            updateInventoryManagement();
            showMessage(`已删除用户 ${user} 的 ${deleted} 条记录`);
        }

        // 重置所有数据
        async function resetAllData() {
            const pwd = prompt('请输入导出密码以确认：');
            if (pwd !== 'hamanicetrip') return alert('密码错误！');

            if (!confirm('⚠️ 这将删除所有记录！确定？')) return;

            roles.forEach(role => {
                inventory[role].remaining = inventory[role].total;
            });

            orders = [];
            saveAllData();

            updateStats();
            updateSelects();
            updateOrdersTable();
            updateInventoryManagement();
            showMessage('所有数据已重置');
        }

        // 导出CSV
        function exportCSV() {
            const pwd = prompt('请输入导出密码：');
            if (pwd !== 'hamanicetrip') return alert('密码错误！');

            let csv = "=== 排表明细 ===\nCN,角色,数量,时间\n";
            orders.forEach(o => csv += `${o.cn},${o.role},${o.quantity},${o.time}\n`);

            csv += "\n=== 库存状态 ===\n角色,总配数,剩余库存\n";
            roles.forEach(role => {
                const item = inventory[role] || { total: 320, remaining: 320 };
                csv += `${role},${item.total},${item.remaining}\n`;
            });

            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '周边排表_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.csv';
            link.click();
        }

        // 导出Excel
        function exportExcel() {
            const pwd = prompt('请输入导出密码：');
            if (pwd !== 'hamanicetrip') return alert('密码错误！');

            let html = `<html><head><meta charset="UTF-8"><style>th{background:#667eea;color:white;padding:8px;}td{padding:6px;border:1px solid #ddd;}</style></head><body>`;
            html += `<h2>排表明细</h2><table border="1"><tr><th>CN</th><th>角色</th><th>数量</th><th>时间</th></tr>`;
            orders.forEach(o => html += `<tr><td>${o.cn}</td><td>${o.role}</td><td>${o.quantity}</td><td>${o.time}</td></tr>`);
            html += `</table><h2>库存状态</h2><table border="1"><tr><th>角色</th><th>总配数</th><th>剩余库存</th></tr>`;
            roles.forEach(role => {
                const item = inventory[role] || { total: 320, remaining: 320 };
                html += `<tr><td>${role}</td><td>${item.total}</td><td>${item.remaining}</td></tr>`;
            });
            html += `</table></body></html>`;

            const blob = new Blob(["\uFEFF" + html], { type: 'application/vnd.ms-excel' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '周边排表_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.xls';
            link.click();
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('isAdmin');
            window.location.href = 'index.html';
        }

        // 初始化
        function init() {
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.main-content').style.display = 'none';
            
            loadSharedData();
            
            updateStats();
            updateRoleList();
            updateInventoryManagement();
            updateSelects();
            updateOrdersTable();
            
            document.getElementById('loading').style.display = 'none';
            document.querySelector('.main-content').style.display = 'block';
        }

        init();
    </script>
</body>
