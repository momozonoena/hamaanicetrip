<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周边排表 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 登录区域 */
        .login-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .user-card {
            border-top: 4px solid #667eea;
        }
        .admin-card {
            border-top: 4px solid #dc3545;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .card-header h3 {
            font-size: 20px;
            color: #333;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .user-icon {
            background: #e6f0ff;
            color: #667eea;
        }
        .admin-icon {
            background: #ffe6e6;
            color: #dc3545;
        }
        .card-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            color: white;
        }
        .btn-user {
            background: #667eea;
        }
        .btn-admin {
            background: #dc3545;
        }
        .feature-list {
            list-style: none;
            margin-top: 15px;
        }
        .feature-list li {
            padding: 5px 0;
            color: #555;
            font-size: 14px;
        }
        .feature-list li:before {
            content: "✓";
            color: #28a745;
            margin-right: 8px;
        }
        .admin-features {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ddd;
        }
        .admin-features-title {
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 10px;
        }
        
        /* 库存区域 */
        .inventory-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        .inventory-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .inventory-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .role-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .stock-number {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 4px;
        }
        .stock-status {
            font-size: 12px;
            color: #666;
        }
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .login-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录区域 -->
        <div class="login-grid">
            <!-- 用户登录 -->
            <div class="login-card user-card">
                <div class="card-header">
                    <div class="card-icon user-icon">👤</div>
                    <h3>用户登录</h3>
                </div>
                <div class="card-subtitle">输入昵称即可开始排表</div>
                <input type="text" id="username" placeholder="请输入你的昵称">
                <button class="btn btn-user" onclick="userLogin()">进入排表系统</button>
                <ul class="feature-list">
                    <li>查看实时库存</li>
                    <li>多角色同时排表</li>
                    <li>购物车功能</li>
                    <li>查看个人排表记录</li>
                </ul>
            </div>
            
            <!-- 管理员登录 -->
            <div class="login-card admin-card">
                <div class="card-header">
                    <div class="card-icon admin-icon">⚙️</div>
                    <h3>管理员登录</h3>
                </div>
                <div class="card-subtitle">输入管理员密码进入后台管理</div>
                <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                <button class="btn btn-admin" onclick="adminLogin()">进入管理后台</button>
                <div class="admin-features">
                    <div class="admin-features-title">🔐 管理员权限：</div>
                    <ul class="feature-list">
                        <li>查看所有排表记录</li>
                        <li>删除/修改排表</li>
                        <li>自定义角色库存</li>
                        <li>导出CSV数据</li>
                        <li>查看用户统计</li>
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- 库存区域 -->
        <div class="inventory-section">
            <div class="inventory-title">📊 当前库存状态</div>
            <div class="inventory-grid" id="inventoryGrid"></div>
            <div class="legend">
                <div class="legend-item"><span class="legend-color" style="background: #d4edda;"></span>充足 (≥150)</div>
                <div class="legend-item"><span class="legend-color" style="background: #fff3cd;"></span>适中 (50-149)</div>
                <div class="legend-item"><span class="legend-color" style="background: #f8d7da;"></span>紧张 (1-49)</div>
                <div class="legend-item"><span class="legend-color" style="background: #e2e3e5;"></span>已售罄 (0)</div>
            </div>
        </div>
        
        <div class="footer">
            <p>每个角色初始库存320张 | 数据自动保存</p>
        </div>
    </div>

    <script>
        // 角色列表（新增辉矢宗氏）
        const ROLES = [
            '丛云添', '大黑可不可', '西园练牙', '神名雪风', '鹿礼光',
            '斜木七基', '衣川季助', '五十竹芥太', '久乐间潮', '夏烧千弥',
            '畔川几成', '北片来人', '木之内太绪', '百目鬼潜', '白光琉衣',
            '白光潜衣', '蜂乃屋凪', '夜半', '辉矢宗氏'
        ];

        // 初始化数据
        function initData() {
            if (!localStorage.getItem('inventory')) {
                const inventory = {};
                ROLES.forEach(role => {
                    inventory[role] = { total: 320, remaining: 320 };
                });
                localStorage.setItem('inventory', JSON.stringify(inventory));
            }
            if (!localStorage.getItem('orders')) {
                localStorage.setItem('orders', JSON.stringify([]));
            }
        }

        // 显示库存
        function displayInventory() {
            const inventory = JSON.parse(localStorage.getItem('inventory')) || {};
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            
            ROLES.forEach(role => {
                const item = inventory[role] || { remaining: 320 };
                const remaining = item.remaining;
                
                let status = '';
                let statusColor = '';
                if (remaining >= 150) {
                    status = '充足';
                    statusColor = '#d4edda';
                } else if (remaining >= 50) {
                    status = '适中';
                    statusColor = '#fff3cd';
                } else if (remaining > 0) {
                    status = '紧张';
                    statusColor = '#f8d7da';
                } else {
                    status = '已售罄';
                    statusColor = '#e2e3e5';
                }
                
                const card = document.createElement('div');
                card.className = 'inventory-card';
                card.innerHTML = `
                    <div class="role-name">${role}</div>
                    <div class="stock-number">${remaining}张</div>
                    <div class="stock-status" style="background: ${statusColor}; padding: 3px; border-radius: 3px;">${status}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 用户登录
        function userLogin() {
            const username = document.getElementById('username').value.trim();
            if (username) {
                localStorage.setItem('currentUser', username);
                localStorage.setItem('isAdmin', 'false');
                window.location.href = 'order.html';
            } else {
                alert('请输入昵称');
            }
        }

        // 管理员登录
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                localStorage.setItem('currentUser', '管理员');
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('密码错误');
            }
        }

        // 初始化
        initData();
        displayInventory();
    </script>
</body>
</html>
